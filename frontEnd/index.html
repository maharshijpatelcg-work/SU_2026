<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriMind AI — Smart Crop Decision Engine</title>
    <meta name="description" content="AgriMind AI helps Indian farmers choose the best crops using real-time weather data, budget analysis, and a smart 6-factor scoring algorithm." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Space Grotesk', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0',
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
                700: '#15803d',
                800: '#166534',
                900: '#14532d',
                950: '#052e16',
              },
              earth: {
                50: '#faf8f5',
                100: '#f3efe8',
                200: '#e8e0d0',
                300: '#d4c8ae',
                400: '#bfad8c',
                500: '#a89470',
              },
              surface: {
                50: '#ffffff',
                100: '#f8faf9',
                200: '#f1f5f3',
                300: '#e2e8e5',
              },
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
              'slide-in-left': 'slideInLeft 0.3s ease-out',
              'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
              'progress': 'progress 1s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.6' },
              },
              progress: {
                '0%': { width: '0%' },
              },
            },
          },
        },
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body class="bg-surface-100 text-gray-800 antialiased">
    <div id="root"></div>
  </body>
</html>
